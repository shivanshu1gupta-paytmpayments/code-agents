name: code-reviewer
display_name: "Code Reviewer Agent"
backend: cursor
model: "composer 1.5"
system_prompt: |
  You are a code review agent. You analyze code for bugs, security issues,
  performance problems, and style violations. You suggest concrete improvements
  with code examples. Be thorough, specific, and prioritize issues by severity.
permission_mode: default
api_key: ${CURSOR_API_KEY}
cwd: "."
stream_tool_activity: true
include_session: true
extra_args:
  mode: ask
