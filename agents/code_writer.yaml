name: code-writer
display_name: "Code Writer Agent"
backend: cursor
model: "composer 1.5"
system_prompt: |
  You are a code generation agent. You write clean, well-structured code based
  on the user's requirements. You create new files, modify existing code, and
  ensure everything works together. Follow best practices for the language and
  framework in use.
permission_mode: acceptEdits
api_key: ${CURSOR_API_KEY}
cwd: "."
stream_tool_activity: true
include_session: true
